<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>瑠璃羽 ✦ お守りカード</title>
<style>

  :root {
    --gold: #c9a96e;
    --gold-light: #e8d5a3;
    --deep: #1a1228;
    --cream: #faf6ee;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: radial-gradient(ellipse at 50% 0%, #2d1b4e 0%, #1a1228 60%, #0d0a1a 100%);

    font-family: 'Noto Sans JP', sans-serif;
    color: var(--cream);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle, rgba(255,255,255,0.8) 1px, transparent 1px),
      radial-gradient(circle, rgba(201,169,110,0.5) 1px, transparent 1px),
      radial-gradient(circle, rgba(255,255,255,0.4) 1px, transparent 1px);
    background-size: 120px 120px, 80px 80px, 50px 50px;
    background-position: 0 0, 40px 40px, 20px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; width: 100%; max-width: 900px; }

  header { text-align: center; margin-bottom: 32px; }
  .logo { font-family: 'Cinzel Decorative', serif; font-size: clamp(1rem, 3vw, 1.4rem); color: var(--gold); letter-spacing: 0.15em; margin-bottom: 4px; }
  .subtitle { font-family: 'Noto Serif JP', serif; font-size: 0.75rem; color: var(--gold-light); letter-spacing: 0.3em; opacity: 0.8; }
  .title-divider { margin: 10px auto; width: 180px; height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent); }

  .main-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }
  @media (max-width: 640px) { .main-layout { grid-template-columns: 1fr; } }

  .panel { background: rgba(255,255,255,0.04); border: 1px solid rgba(201,169,110,0.25); border-radius: 16px; padding: 20px; backdrop-filter: blur(8px); }
  .panel-title { font-family: 'Noto Serif JP', serif; font-size: 0.7rem; color: var(--gold); letter-spacing: 0.3em; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .panel-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, rgba(201,169,110,0.4), transparent); }

  .search-box { display: flex; gap: 8px; margin-bottom: 12px; }
  input[type="text"] { flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(201,169,110,0.3); border-radius: 8px; color: var(--cream); font-family: 'Noto Sans JP', sans-serif; font-size: 0.85rem; padding: 9px 12px; outline: none; transition: border 0.2s; }
  input[type="text"]::placeholder { color: rgba(250,246,238,0.35); }
  input[type="text"]:focus { border-color: var(--gold); }

  .btn { background: linear-gradient(135deg, rgba(201,169,110,0.25), rgba(201,169,110,0.1)); border: 1px solid rgba(201,169,110,0.5); border-radius: 8px; color: var(--gold-light); cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-size: 0.8rem; padding: 9px 14px; transition: all 0.2s; white-space: nowrap; }
  .btn:hover { background: linear-gradient(135deg, rgba(201,169,110,0.45), rgba(201,169,110,0.2)); border-color: var(--gold); color: var(--gold); }
  .btn-primary { background: linear-gradient(135deg, rgba(201,169,110,0.5), rgba(201,169,110,0.25)); width: 100%; padding: 10px; font-size: 0.85rem; margin-top: 10px; }

  .hexagram-list { max-height: 280px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; scrollbar-width: thin; scrollbar-color: rgba(201,169,110,0.3) transparent; }
  .hexagram-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; cursor: pointer; transition: background 0.15s; border: 1px solid transparent; }
  .hexagram-item:hover { background: rgba(201,169,110,0.08); border-color: rgba(201,169,110,0.15); }
  .hexagram-item.selected { background: rgba(201,169,110,0.15); border-color: rgba(201,169,110,0.4); }
  .hex-mini-canvas { width: 48px; height: 64px; flex-shrink: 0; }
  .hex-info { flex: 1; }
  .hex-name { font-family: 'Noto Serif JP', serif; font-size: 0.85rem; color: var(--cream); }
  .hex-reading { font-size: 0.68rem; color: rgba(250,246,238,0.55); margin-top: 1px; }
  .hex-number { font-size: 0.65rem; color: rgba(201,169,110,0.6); min-width: 28px; text-align: right; }

  .selected-display { text-align: center; padding: 14px; background: rgba(201,169,110,0.06); border: 1px solid rgba(201,169,110,0.2); border-radius: 10px; margin-top: 12px; min-height: 80px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 6px; }
  .selected-name { font-family: 'Noto Serif JP', serif; font-size: 1rem; color: var(--cream); }
  .selected-reading { font-size: 0.72rem; color: rgba(250,246,238,0.55); }
  .placeholder-text { color: rgba(250,246,238,0.3); font-size: 0.78rem; letter-spacing: 0.1em; }

  .upload-icon { font-size: 1.8rem; margin-bottom: 6px; }
  .upload-text { font-size: 0.75rem; color: rgba(250,246,238,0.5); }

          <span class="setting-label">卦の位置</span>
          <select id="positionSelect">

        </div>
        <div class="setting-row">

    </div>
  </div>

let selectedHex = null;

// ============================================================
// 爻をCanvasに描画（下から上の順 lines[0]=初爻〜lines[5]=上爻）
// 画面上は上から描く（lines[5]→lines[0]）
// ============================================================
function drawHexagram(ctx, lines, x, y, width, color) {
  // 本来の卦の比率：爻は細い横棒、高さは幅の約1/6、間隔は爻の高さと同程度
  // 爻：横長の細い棒。高さは幅の約1/12、間隔は高さの1.2倍
  const lineH  = width * 0.085;  // 爻の高さ（細く横長に）
  const gap    = width * 0.105;  // 爻と爻の間隔
  const breakW = width * 0.20;   // 陰爻の中央切れ目（幅の1/5）

  ctx.fillStyle = color;

  for (let i = 5; i >= 0; i--) {
    const row = 5 - i;
    const ey  = y + row * (lineH + gap);

    if (lines[i] === 1) {
      // 陽爻：一本の棒（角なし）
      ctx.fillRect(x, ey, width, lineH);
    } else {
      // 陰爻：左右2本（角なし）
      const segW = (width - breakW) / 2;
      ctx.fillRect(x, ey, segW, lineH);
      ctx.fillRect(x + segW + breakW, ey, segW, lineH);
    }
  }
  return lineH * 6 + gap * 5;
}

function rRect(ctx, x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ミニ描画（リスト用）
function drawMini(canvas, lines) {
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = 48 * dpr; canvas.height = 64 * dpr;
  canvas.style.width = '48px'; canvas.style.height = '64px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, 48, 64);
  drawHexagram(ctx, lines, 0, 0, 48, 'rgba(201,169,110,0.9)');
}

// リスト描画
function renderList(filtered) {
  const list = document.getElementById('hexagramList');
  list.innerHTML = filtered.map(h => `
    <div class="hexagram-item ${selectedHex && selectedHex.no === h.no ? 'selected' : ''}" onclick="selectHex(${h.no})">
      <canvas class="hex-mini-canvas" id="mini-${h.no}"></canvas>
      <div class="hex-info">
        <div class="hex-name">${h.name}</div>
        <div class="hex-reading">（${h.kana}）</div>
      </div>
      <span class="hex-number">第${h.no}卦</span>
    </div>
  `).join('');
  filtered.forEach(h => {
    const c = document.getElementById(`mini-${h.no}`);
    if (c) drawMini(c, h.lines);
  });
}

renderList(hexagrams);

document.getElementById('searchInput').addEventListener('input', function() {

  const num = parseInt(q);

function clearSearch() {

  renderList(hexagrams);
}

function selectHex(no) {
  selectedHex = hexagrams.find(h => h.no === no);
  const disp = document.getElementById('selectedDisplay');
  disp.innerHTML = `
    <canvas id="selCanvas" style="width:44px;height:56px;"></canvas>
    <span class="selected-name">第${selectedHex.no}卦 『${selectedHex.name}』</span>
    <span class="selected-reading">（${selectedHex.kana}）</span>
  `;
  const sc = document.getElementById('selCanvas');
  const dpr = window.devicePixelRatio || 1;
  sc.width = 44*dpr; sc.height = 56*dpr;
  sc.style.width='44px'; sc.style.height='56px';
  const sctx = sc.getContext('2d');
  sctx.scale(dpr,dpr);
  drawHexagram(sctx, selectedHex.lines, 0, 0, 44, '#e8d5a3');

  const q = document.getElementById('searchInput').value;
  renderList(hexagrams.filter(h => !q || h.name.includes(q) || h.kana.includes(q) || String(h.no)===q));
  if (uploadedImage) renderCard();
}

document.getElementById('imageUpload').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      uploadedImage = img;
      document.getElementById('uploadArea').style.borderColor = 'var(--gold)';
      document.getElementById('uploadText').textContent = file.name;
      if (selectedHex) renderCard();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

function renderCard() {
  if (!uploadedImage || !selectedHex) {
    alert(!uploadedImage ? 'イラスト画像をアップロードしてください' : '卦を選択してください');
    return;
  }

  const canvas = document.getElementById('cardCanvas');
  const ctx    = canvas.getContext('2d');
  const cont   = document.getElementById('canvasContainer');

  const maxW  = Math.min(cont.clientWidth - 2, 420);
  const ratio = uploadedImage.height / uploadedImage.width;
  canvas.width  = maxW;
  canvas.height = maxW * ratio;

  ctx.drawImage(uploadedImage, 0, 0, canvas.width, canvas.height);

  const sizeKey  = document.getElementById('sizeSelect').value;
  const colorKey = document.getElementById('colorSelect').value;
  const textMode = document.getElementById('textSelect').value;
  const pos      = document.getElementById('positionSelect').value;

  const hexW   = sizeKey==='large' ? canvas.width*0.22 : sizeKey==='small' ? canvas.width*0.12 : canvas.width*0.17;
  const lineH  = hexW * 0.085;
  const gap    = hexW * 0.105;
  const hexH   = lineH * 6 + gap * 5;

  const nameSize = hexW * 0.30;
  const kanaSize = hexW * 0.21;
  let textH = 0;
  if (textMode==='full') textH = nameSize*1.5 + kanaSize*1.5 + 10;
  if (textMode==='name') textH = nameSize*1.5 + 10;

  const totalH = hexH + textH + 14;
  const cx = canvas.width * 0.5;

  let topY;
  if (pos==='top')    topY = canvas.height*0.05;
  else if (pos==='bottom') topY = canvas.height - totalH - canvas.height*0.05;
  else topY = (canvas.height - totalH) * 0.5;

  const hexX = cx - hexW*0.5;

  const mainColor = colorKey==='gold' ? '#e8d5a3' : colorKey==='dark' ? '#1a1228' : '#ffffff';
  const shadowC   = colorKey==='dark' ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.8)';

  // 背景グロー
  if (colorKey !== 'dark') {
    const gcy = topY + totalH * 0.5;
    const grad = ctx.createRadialGradient(cx, gcy, 0, cx, gcy, totalH*0.7);
    grad.addColorStop(0, 'rgba(0,0,0,0.55)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(cx, gcy, hexW*1.5, totalH*0.65, 0, 0, Math.PI*2);
    ctx.fill();
  }

  // 爻を描画
  ctx.save();
  ctx.shadowColor = shadowC;
  ctx.shadowBlur  = 5;
  ctx.fillStyle   = mainColor;
  drawHexagram(ctx, selectedHex.lines, hexX, topY, hexW, mainColor);
  ctx.restore();

  // 区切りライン
  const lineY = topY + hexH + 7;
  if (textMode !== 'none') {
    ctx.save();
    const lg = ctx.createLinearGradient(cx-hexW, lineY, cx+hexW, lineY);
    lg.addColorStop(0,'transparent'); lg.addColorStop(0.5, mainColor); lg.addColorStop(1,'transparent');
    ctx.globalAlpha = 0.5;
    ctx.strokeStyle = lg;
    ctx.lineWidth = 0.7;
    ctx.beginPath(); ctx.moveTo(cx-hexW, lineY); ctx.lineTo(cx+hexW, lineY); ctx.stroke();
    ctx.restore();
  }

  // テキスト
  function dText(text, size, y, alpha) {
    ctx.save();
    ctx.font = `${size}px "Noto Serif JP", serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = shadowC; ctx.shadowBlur = 8;
    ctx.globalAlpha = alpha||1; ctx.fillStyle = mainColor;
    ctx.fillText(text, cx, y);
    ctx.restore();
  }

  let ty = lineY + nameSize * 0.9;
  if (textMode==='full'||textMode==='name') { dText(`第${selectedHex.no}卦　${selectedHex.name}`, nameSize, ty); ty += nameSize*1.4; }
  if (textMode==='full') dText(`（${selectedHex.kana}）`, kanaSize, ty, 0.75);

  document.getElementById('canvasPlaceholder').style.display = 'none';
  canvas.style.display = 'block';
  document.getElementById('downloadBtn').classList.add('ready');
}

function downloadCard() {
  const canvas = document.getElementById('cardCanvas');
  const a = document.createElement('a');
  a.download = `omamori_${selectedHex.no}_${selectedHex.name}.png`;
  a.href = canvas.toDataURL('image/png');
  a.click();
}
</script>
