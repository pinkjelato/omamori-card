<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>瑠璃羽 ✦ お守りカード</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Cinzel+Decorative:wght@400;700&family=Noto+Sans+JP:wght@300;400&display=swap');

  :root {
    --gold: #c9a96e;
    --gold-light: #e8d5a3;
    --deep: #1a1228;
    --cream: #faf6ee;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: radial-gradient(ellipse at 50% 0%, #2d1b4e 0%, #1a1228 60%, #0d0a1a 100%);
    min-height: 100vh;
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--cream);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle, rgba(255,255,255,0.8) 1px, transparent 1px),
      radial-gradient(circle, rgba(201,169,110,0.5) 1px, transparent 1px),
      radial-gradient(circle, rgba(255,255,255,0.4) 1px, transparent 1px);
    background-size: 120px 120px, 80px 80px, 50px 50px;
    background-position: 0 0, 40px 40px, 20px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; width: 100%; max-width: 900px; }

  header { text-align: center; margin-bottom: 32px; }
  .logo { font-family: 'Cinzel Decorative', serif; font-size: clamp(1rem, 3vw, 1.4rem); color: var(--gold); letter-spacing: 0.15em; margin-bottom: 4px; }
  .subtitle { font-family: 'Noto Serif JP', serif; font-size: 0.75rem; color: var(--gold-light); letter-spacing: 0.3em; opacity: 0.8; }
  .title-divider { margin: 10px auto; width: 180px; height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent); }

  .main-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }
  @media (max-width: 640px) { .main-layout { grid-template-columns: 1fr; } }

  .panel { background: rgba(255,255,255,0.04); border: 1px solid rgba(201,169,110,0.25); border-radius: 16px; padding: 20px; backdrop-filter: blur(8px); }
  .panel-title { font-family: 'Noto Serif JP', serif; font-size: 0.7rem; color: var(--gold); letter-spacing: 0.3em; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .panel-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, rgba(201,169,110,0.4), transparent); }

  .search-box { display: flex; gap: 8px; margin-bottom: 12px; }
  input[type="text"] { flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(201,169,110,0.3); border-radius: 8px; color: var(--cream); font-family: 'Noto Sans JP', sans-serif; font-size: 0.85rem; padding: 9px 12px; outline: none; transition: border 0.2s; }
  input[type="text"]::placeholder { color: rgba(250,246,238,0.35); }
  input[type="text"]:focus { border-color: var(--gold); }

  .btn { background: linear-gradient(135deg, rgba(201,169,110,0.25), rgba(201,169,110,0.1)); border: 1px solid rgba(201,169,110,0.5); border-radius: 8px; color: var(--gold-light); cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-size: 0.8rem; padding: 9px 14px; transition: all 0.2s; white-space: nowrap; }
  .btn:hover { background: linear-gradient(135deg, rgba(201,169,110,0.45), rgba(201,169,110,0.2)); border-color: var(--gold); color: var(--gold); }

  .hexagram-list { max-height: 280px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; scrollbar-width: thin; scrollbar-color: rgba(201,169,110,0.3) transparent; }
  .hexagram-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; cursor: pointer; transition: background 0.15s; border: 1px solid transparent; }
  .hexagram-item:hover { background: rgba(201,169,110,0.08); border-color: rgba(201,169,110,0.15); }
  .hexagram-item.selected { background: rgba(201,169,110,0.15); border-color: rgba(201,169,110,0.4); }
  .hex-mini-canvas { width: 48px; height: 64px; flex-shrink: 0; }
  .hex-info { flex: 1; }
  .hex-name { font-family: 'Noto Serif JP', serif; font-size: 0.85rem; color: var(--cream); }
  .hex-reading { font-size: 0.68rem; color: rgba(250,246,238,0.55); margin-top: 1px; }
  .hex-number { font-size: 0.65rem; color: rgba(201,169,110,0.6); min-width: 28px; text-align: right; }

  .selected-display { text-align: center; padding: 14px; background: rgba(201,169,110,0.06); border: 1px solid rgba(201,169,110,0.2); border-radius: 10px; margin-top: 12px; min-height: 80px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 6px; }
  .selected-name { font-family: 'Noto Serif JP', serif; font-size: 1rem; color: var(--cream); }
  .selected-reading { font-size: 0.72rem; color: rgba(250,246,238,0.55); }
  .placeholder-text { color: rgba(250,246,238,0.3); font-size: 0.78rem; letter-spacing: 0.1em; }

  .upload-area { border: 1.5px dashed rgba(201,169,110,0.35); border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.2s; background: rgba(255,255,255,0.02); }
  .upload-area:hover { border-color: var(--gold); background: rgba(201,169,110,0.04); }
  .upload-area input[type="file"] { display: none; }
  .upload-icon { font-size: 1.8rem; margin-bottom: 6px; }
  .upload-text { font-size: 0.75rem; color: rgba(250,246,238,0.5); }

  .overlay-settings { margin-top: 14px; display: flex; flex-direction: column; gap: 10px; }
  .setting-row { display: flex; align-items: center; gap: 10px; font-size: 0.75rem; color: rgba(250,246,238,0.65); }
  .setting-label { min-width: 80px; letter-spacing: 0.05em; }
  
  select { flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(201,169,110,0.3); border-radius: 6px; color: var(--cream); font-size: 0.75rem; padding: 5px 8px; outline: none; font-family: 'Noto Sans JP', sans-serif; }
  select:focus { border-color: var(--gold); }
  
  input[type="range"] { flex: 1; accent-color: var(--gold); cursor: pointer; }

  .card-preview-area { margin-top: 20px; }
  .canvas-container { position: relative; width: 100%; border-radius: 12px; border: 1px solid rgba(201,169,110,0.2); background: rgba(0,0,0,0.3); min-height: 200px; display: flex; align-items: center; justify-content: center; }
  canvas { max-width: 100%; display: block; }
  .canvas-placeholder { color: rgba(250,246,238,0.2); font-size: 0.78rem; text-align: center; padding: 40px 20px; }

  .btn-download { background: linear-gradient(135deg, var(--gold) 0%, #a07840 100%); border: none; border-radius: 10px; color: #1a1228; cursor: pointer; font-family: 'Noto Serif JP', serif; font-size: 0.85rem; font-weight: 700; letter-spacing: 0.12em; padding: 12px; width: 100%; margin-top: 10px; transition: all 0.2s; opacity: 0.4; pointer-events: none; }
  .btn-download.ready { opacity: 1; pointer-events: all; box-shadow: 0 4px 20px rgba(201,169,110,0.3); }
  .btn-download.ready:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(201,169,110,0.45); }

  .footer-ornament { text-align: center; margin-top: 32px; color: rgba(201,169,110,0.35); font-size: 0.7rem; letter-spacing: 0.3em; }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="logo">✦ Luliha ✦</div>
    <div class="title-divider"></div>
    <div class="subtitle">お守りカード ✦ メーカー</div>
  </header>

  <div class="main-layout">
    <div class="panel">
      <div class="panel-title">✦ 卦を選ぶ</div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="番号 or 卦名で検索（例: 19、地沢臨）">
        <button class="btn" onclick="clearSearch()">✕</button>
      </div>
      <div class="hexagram-list" id="hexagramList"></div>
      <div class="selected-display" id="selectedDisplay">
        <span class="placeholder-text">✦ 卦を選択してください ✦</span>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">✦ イラストをアップロード</div>
      <div class="upload-area" id="uploadArea" onclick="document.getElementById('imageUpload').click()">
        <input type="file" id="imageUpload" accept="image/*">
        <div class="upload-icon">🔮</div>
        <div class="upload-text" id="uploadText">カードイラストを選択<br><span style="font-size:0.65rem;opacity:0.6">JPG / PNG / WEBP</span></div>
      </div>

      <div class="overlay-settings">
        <div class="setting-row">
          <span class="setting-label">上下の位置</span>
          <input type="range" id="posY" min="0" max="30" step="0.1" value="11" oninput="renderCard()">
        </div>
        <div class="setting-row">
          <span class="setting-label">左右の位置</span>
          <input type="range" id="posX" min="-10" max="10" step="0.1" value="0" oninput="renderCard()">
        </div>

        <div class="setting-row">
          <span class="setting-label">卦のサイズ</span>
          <select id="sizeSelect" onchange="renderCard()">
            <option value="large">大</option>
            <option value="medium" selected>中</option>
            <option value="small">小</option>
          </select>
        </div>
        <div class="setting-row">
          <span class="setting-label">爻の色</span>
          <select id="colorSelect" onchange="renderCard()">
            <option value="gold" selected>ゴールド</option>
            <option value="white">ホワイト</option>
            <option value="dark">ダーク（黒）</option>
          </select>
        </div>
        <div class="setting-row">
          <span class="setting-label">卦名テキスト</span>
          <select id="textSelect" onchange="renderCard()">
            <option value="full">卦名＋読み仮名</option>
            <option value="name">卦名のみ</option>
            <option value="none" selected>表示しない</option>
          </select>
        </div>
      </div>

      <div class="card-preview-area">
        <div class="panel-title" style="margin-top:14px;">✦ プレビュー</div>
        <div class="canvas-container" id="canvasContainer">
          <div class="canvas-placeholder" id="canvasPlaceholder">卦を選択して<br>イラストをアップロードすると<br>ここにプレビューが表示されます</div>
          <canvas id="cardCanvas" style="display:none;"></canvas>
        </div>
        <button class="btn-download" id="downloadBtn" onclick="downloadCard()">✦ お守りカードをダウンロード ✦</button>
      </div>
    </div>
  </div>

 <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; font-display: swap;">
    <span style="font-family: 'Times New Roman', serif; font-size: 18px; letter-spacing: 0.05em; color: var(--gold); font-weight: 300;">Stella✧Terra</span>
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; width: 32px; height: 32px; background-color: #c93a40; border-radius: 2px; box-shadow: 1px 1px 2px rgba(0,0,0,0.2); line-height: 1.1;">
        <span style="color: white; font-family: 'Yu Mincho', serif; font-size: 9px; font-weight: bold;">捨</span>
        <div style="display: flex; gap: 1px;">
            <span style="color: white; font-family: 'Yu Mincho', serif; font-size: 9px; font-weight: bold;">樂</span>
            <span style="color: white; font-family: 'Yu Mincho', serif; font-size: 9px; font-weight: bold;">寺</span>
        </div>
    </div>
</div>
</div>
