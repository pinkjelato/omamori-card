<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stella ✧ Terra 捨樂寺 お守りカード作成</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Cinzel+Decorative:wght@400;700&display=swap');

        :root {
            --gold: #c9a96e;
            --gold-light: #e8d5a3;
            --deep: #1a1228;
            --cream: #faf6ee;
            --vermilion: #c93a40; /* 捨樂寺・朱色 */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: radial-gradient(ellipse at 50% 0%, #2d1b4e 0%, #1a1228 60%, #0d0a1a 100%);
            color: var(--cream);
            font-family: 'Noto Serif JP', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            font-family: 'Cinzel Decorative', cursive;
            color: var(--gold);
            margin-bottom: 20px;
            font-size: 1.5rem;
            letter-spacing: 2px;
        }

        .controls {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(201, 169, 110, 0.3);
            padding: 20px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
        }

        .control-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--gold-light); font-size: 0.8rem; }
        
        input[type="range"] {
            width: 100%;
            accent-color: var(--gold);
            cursor: pointer;
        }

        .canvas-container {
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        canvas {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .download-btn {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            color: var(--deep);
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            font-family: 'Noto Serif JP', serif;
        }

        .download-btn:hover { transform: scale(1.05); }

    </style>
</head>
<body>

    <h1>STELLA ✧ TERRA</h1>

    <div class="controls">
        <div class="control-group">
            <label>画像の上下位置調整</label>
            <input type="range" id="yOffset" min="-200" max="200" value="0">
        </div>
        <div class="control-group">
            <label>画像の拡大率</label>
            <input type="range" id="scale" min="0.5" max="2.0" step="0.1" value="1.0">
        </div>
        <div style="text-align: center; color: var(--gold); font-size: 0.7rem; letter-spacing: 1px;">
            捨 樂 寺 謹 製
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="cardCanvas" width="400" height="600"></canvas>
    </div>

    <button class="download-btn" id="downloadBtn">◆ お守りカードをダウンロード ◆</button>

    <script>
        const canvas = document.getElementById('cardCanvas');
        const ctx = canvas.getContext('2d');
        const yOffsetSlider = document.getElementById('yOffset');
        const scaleSlider = document.getElementById('scale');
        const downloadBtn = document.getElementById('downloadBtn');

        // お守りの背景画像（蓮の画像など）
        const bgImage = new Image();
        bgImage.crossOrigin = "anonymous";
        // ここに現在お使いの画像のURLを入れてください（例として蓮の画像を置いておきます）
        bgImage.src = "https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=800&q=80"; 

        const frameImage = new Image();
        frameImage.crossOrigin = "anonymous";
        // 額縁の画像URL（もしあれば）
        frameImage.src = ""; 

        function drawCard() {
            // 1. 背景を塗りつぶす（カードの台紙色）
            ctx.fillStyle = "#faf6ee";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. メイン画像を描画（スライダーの値を反映）
            const scale = parseFloat(scaleSlider.value);
            const yOffset = parseInt(yOffsetSlider.value);
            
            const imgW = canvas.width * scale;
            const imgH = (bgImage.height * (canvas.width / bgImage.width)) * scale;
            const imgX = (canvas.width - imgW) / 2;
            const imgY = yOffset;

            ctx.drawImage(bgImage, imgX, imgY, imgW, imgH);

            // 3. テキストエリアの装飾（薄いグラデーションなど）
            const gradient = ctx.createLinearGradient(0, 450, 0, 600);
            gradient.addColorStop(0, 'rgba(250, 246, 238, 0.8)');
            gradient.addColorStop(1, 'rgba(250, 246, 238, 1)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 450, canvas.width, 150);

            // 4. メッセージ描画
            ctx.fillStyle = "#333";
            ctx.textAlign = "center";
            ctx.font = "bold 18px 'Noto Serif JP'";
            ctx.fillText("『地沢臨』", canvas.width / 2, 490);
            
            ctx.font = "12px 'Noto Serif JP'";
            const text = "大きなチャンスが訪れています。前向きな心で受け入れましょう。";
            ctx.fillText(text, canvas.width / 2, 520);

            // 5. --- 捨樂寺・ブランドロゴ描画 ---
            const brandY = canvas.height - 35;
            
            // 英語：STELLA ✧ TERRA
            ctx.font = "300 13px 'Times New Roman', serif";
            ctx.fillStyle = "#444";
            ctx.letterSpacing = "2px";
            const engText = "STELLA ✧ TERRA";
            const engWidth = ctx.measureText(engText).width;
            const totalWidth = engWidth + 40; // 英語 + スペース + 印鑑
            const startX = (canvas.width - totalWidth) / 2;

            ctx.textAlign = "left";
            ctx.fillText(engText, startX, brandY);

            // 朱色の角印
            const sealSize = 24;
            const sealX = startX + engWidth + 10;
            const sealY = brandY - 17;
            
            ctx.fillStyle = "#c93a40";
            ctx.fillRect(sealX, sealY, sealSize, sealSize);

            // 印鑑の中の文字
            ctx.fillStyle = "white";
            ctx.letterSpacing = "0px";
            ctx.font = "bold 9px 'Noto Serif JP'";
            ctx.fillText("捨", sealX + 6, sealY + 11);
            ctx.fillText("樂", sealX + 2, sealY + 21);
            ctx.fillText("寺", sealX + 12, sealY + 21);
        }

        // 画像読み込み完了時に描画
        bgImage.onload = drawCard;
        yOffsetSlider.oninput = drawCard;
        scaleSlider.oninput = drawCard;

        // ダウンロード機能
        downloadBtn.onclick = () => {
            const link = document.createElement('a');
            link.download = 'omamori-card-sharakuji.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        };
    </script>
</body>
</html>
